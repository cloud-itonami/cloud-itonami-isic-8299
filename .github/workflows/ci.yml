name: ci

# NOTE: the cloud-itonami org may disable GitHub Actions org-wide (as gftdcojp
# currently does for cloud-itonami-6310); this workflow is kept correct and
# ready regardless: it runs verbatim once Actions are enabled, or if this
# project is mirrored under an Actions-enabled org. Until then the gates run
# locally / in the west superproject: `clojure -M:lint` and `clojure -M:dev:test`.
#
# This project is a standalone open-business blueprint (not west-registered,
# per ADR-2607031500/2607110400). Its deps reference sibling repos via
# :local/root (../../kotoba-lang/langgraph, .../langchain). Those two are
# PUBLIC, so the test job reconstructs the workspace layout by checking them
# out into the expected relative paths — no token needed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      # lay the west workspace out so ../../kotoba-lang/* resolves
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-8299 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      # deps.edn declares an unconditional top-level :local/root dep on
      # cloud-itonami-isic-8291 (bizsupport.screening's cross-reference),
      # and that repo itself needs kotoba-lang/langchain-store via
      # :local/root -- both are required for tools.deps to resolve the
      # classpath even though most namespaces here never touch either.
      - uses: actions/checkout@v4
        with:
          repository: cloud-itonami/cloud-itonami-isic-8291
          path: orgs/cloud-itonami/cloud-itonami-isic-8291
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain-store
          path: orgs/kotoba-lang/langchain-store
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (governor contract · store parity · LLM advisor · phases)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-8299
        run: clojure -M:dev:test
