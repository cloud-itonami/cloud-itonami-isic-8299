name: regenerate-console
on:
  schedule:
    - cron: '47 3 * * *'   # off-minute nightly slot, JST-shifted
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: orgs/cloud-itonami/cloud-itonami-isic-8299
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/langchain, path: orgs/kotoba-lang/langchain}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/langgraph, path: orgs/kotoba-lang/langgraph}
      # required even though bizsupport.render-html itself never requires
      # bizsupport.screening -- this repo's deps.edn declares
      # io.github.cloud-itonami/cloud-itonami-isic-8291 as an unconditional
      # top-level :local/root dep (only bizsupport.screening has a
      # compile-time require on dossier.*, but tools.deps still needs the
      # sibling checkout to exist to resolve the classpath at all).
      - uses: actions/checkout@v4
        with: {repository: cloud-itonami/cloud-itonami-isic-8291, path: orgs/cloud-itonami/cloud-itonami-isic-8291}
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: regenerate through the real actor
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-8299
        run: clojure -M:dev:render-html
      - name: verify (real output, not scaffolding)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-8299
        run: |
          grep -q 'bizsupport.render-html' docs/samples/operator-console.html
          grep -q '<tbody>' docs/samples/operator-console.html
          test "$(wc -l < docs/samples/operator-console.html)" -gt 30
          echo "operator console sanity ok"
      - name: commit when changed
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-8299
        run: |
          if ! git diff --quiet docs/; then
            git config user.name "regenerate-console[bot]"
            git config user.email "noreply@github.com"
            git add docs/
            git commit -m "chore(console): nightly regeneration through the real actor"
            git push
          else
            echo "console unchanged"
          fi
